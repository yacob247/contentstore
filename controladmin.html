<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Hub | Infinite Storage Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #f3f4f6; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(75, 85, 99, 0.3); }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        
        .progress-shimmer {
            background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 50%, #3b82f6 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen">

    <!-- Access Lock -->
    <div id="auth-overlay" class="fixed inset-0 z-[100] bg-gray-950 flex items-center justify-center p-6">
        <div class="w-full max-w-md glass-card p-10 rounded-[2.5rem] text-center shadow-2xl">
            <div class="w-20 h-20 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-blue-500/20">
                <i class="fa-solid fa-vault text-4xl text-blue-500"></i>
            </div>
            <h1 class="text-3xl font-extrabold mb-2 tracking-tight">Nexus Admin</h1>
            <p class="text-gray-500 text-sm mb-8">Infinite Storage Cluster Access</p>
            <form onsubmit="unlockAdmin(event)" class="space-y-4">
                <input type="password" id="admin-key" required class="w-full bg-gray-950 border border-gray-800 rounded-2xl px-5 py-4 text-center text-2xl tracking-[0.4em] focus:border-blue-500 outline-none transition" placeholder="••••">
                <button type="submit" class="w-full btn-gradient py-4 rounded-2xl font-bold text-lg">Initialize Session</button>
            </form>
        </div>
    </div>

    <!-- Main Workspace -->
    <div id="workspace" class="hidden flex-col min-h-screen">
        <header class="sticky top-0 z-50 glass-card border-x-0 border-t-0 border-b">
            <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/40">
                        <i class="fa-solid fa-infinity text-white text-xl"></i>
                    </div>
                    <span class="font-extrabold text-2xl tracking-tighter">INFINITE<span class="text-blue-500">HUB</span></span>
                </div>
                <nav class="flex items-center gap-8">
                    <button onclick="setTab('dashboard')" class="text-sm font-semibold hover:text-blue-400 transition" id="tab-dash">Dashboard</button>
                    <button onclick="setTab('upload')" class="bg-blue-600 hover:bg-blue-700 px-6 py-2.5 rounded-xl text-sm font-bold transition shadow-lg">New Deployment</button>
                    <button onclick="location.reload()" class="text-gray-500 hover:text-red-400"><i class="fa-solid fa-power-off text-lg"></i></button>
                </nav>
            </div>
        </header>

        <main id="main-content" class="max-w-6xl mx-auto p-8 w-full"></main>
    </div>

    <!-- Smart Upload Processing Overlay -->
    <div id="processing-overlay" class="fixed inset-0 z-[110] bg-gray-950/95 backdrop-blur-xl flex items-center justify-center hidden p-6">
        <div class="w-full max-w-lg glass-card p-12 rounded-[3rem] text-center">
            <div class="mb-8">
                <div class="w-24 h-24 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-500/20">
                    <i id="proc-icon" class="fa-solid fa-microchip text-5xl text-blue-500 animate-pulse"></i>
                </div>
                <h2 id="proc-title" class="text-2xl font-bold mb-2">Infinite Stream Sync</h2>
                <p id="proc-status" class="text-gray-400 text-sm font-mono">Compressing and Routing Bytes...</p>
            </div>

            <div class="relative h-4 bg-gray-900 rounded-full overflow-hidden border border-gray-800 mb-4">
                <div id="proc-bar" class="absolute top-0 left-0 h-full progress-shimmer w-0 transition-all duration-300"></div>
            </div>
            <div id="proc-meta" class="flex justify-between text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                <span>Optimizing Data</span>
                <span id="proc-perc">0%</span>
            </div>

            <button onclick="abortOperation()" class="mt-10 text-gray-500 hover:text-white text-xs font-bold uppercase tracking-widest transition">Cancel Link</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, currentTab = 'dashboard';
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'infinite-nexus-v1';
        const firebaseConfig = JSON.parse(__firebase_config);

        window.unlockAdmin = (e) => {
            e.preventDefault();
            if (document.getElementById('admin-key').value === 'password123') {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('workspace').classList.remove('hidden');
                document.getElementById('workspace').classList.add('flex');
                init();
            } else { alert("Key Denied"); }
        };

        async function init() {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            await signInAnonymously(auth);
            onAuthStateChanged(auth, u => {
                if (u) {
                    setTab('dashboard');
                }
            });
        }

        window.setTab = (tab) => {
            currentTab = tab;
            render();
        }

        async function render() {
            const container = document.getElementById('main-content');
            if (currentTab === 'dashboard') {
                container.innerHTML = `<div class="grid gap-6" id="items-grid"></div>`;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'content_hub_items');
                onSnapshot(q, snap => {
                    const items = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    document.getElementById('items-grid').innerHTML = `
                        <div class="flex justify-between items-end mb-4">
                            <div>
                                <h2 class="text-3xl font-extrabold">Active Nodes</h2>
                                <p class="text-gray-500">Live storage data across the cluster</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${items.map(i => `
                                <div class="glass-card p-6 rounded-3xl hover:border-blue-500/50 transition-all group fade-in">
                                    <div class="flex justify-between items-start mb-6">
                                        <div class="w-12 h-12 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-400 group-hover:scale-110 transition">
                                            <i class="fa-solid ${i.category === 'software' ? 'fa-box-archive' : i.category === 'media' ? 'fa-clapperboard' : 'fa-file-lines'} text-xl"></i>
                                        </div>
                                        <button onclick="removeItem('${i.id}')" class="text-gray-600 hover:text-red-500 transition"><i class="fa-solid fa-trash-can"></i></button>
                                    </div>
                                    <h3 class="font-bold text-xl mb-2">${i.title}</h3>
                                    <p class="text-gray-500 text-sm mb-6 line-clamp-2">${i.description}</p>
                                    <div class="flex items-center gap-2 pt-4 border-t border-gray-800">
                                        <span class="text-[10px] font-bold uppercase tracking-widest text-blue-500">${i.files?.length || 0} Assets Loaded</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                });
            } else {
                container.innerHTML = `
                    <div class="max-w-2xl mx-auto py-4 fade-in">
                        <form onsubmit="handleInfiniteUpload(event)" class="glass-card p-10 rounded-[2.5rem] space-y-6">
                            <h2 class="text-2xl font-bold mb-4">New Asset Stream</h2>
                            <div class="space-y-4">
                                <input id="up-title" required class="w-full bg-black border border-gray-800 rounded-2xl p-5 focus:border-blue-500 outline-none transition" placeholder="Project Title">
                                <textarea id="up-desc" required class="w-full bg-black border border-gray-800 rounded-2xl p-5 h-32 focus:border-blue-500 outline-none transition" placeholder="Write documentation or description..."></textarea>
                                <div class="grid grid-cols-2 gap-4">
                                    <select id="up-cat" class="bg-black border border-gray-800 rounded-2xl p-5 outline-none">
                                        <option value="software">Software / Code</option>
                                        <option value="media">Multimedia</option>
                                        <option value="docs">Documentation</option>
                                    </select>
                                    <div class="relative group">
                                        <div class="absolute inset-0 bg-blue-600 blur opacity-20 group-hover:opacity-40 transition"></div>
                                        <input type="file" id="up-file" required class="relative w-full bg-black border border-gray-800 rounded-2xl p-4 text-xs text-gray-500 file:bg-blue-600 file:border-0 file:rounded-xl file:px-4 file:py-2 file:text-white file:font-bold file:mr-4">
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="w-full btn-gradient py-5 rounded-2xl font-bold text-lg shadow-xl">Push to Infinite Storage</button>
                        </form>
                    </div>
                `;
            }
        }

        window.handleInfiniteUpload = async (e) => {
            e.preventDefault();
            const file = document.getElementById('up-file').files[0];
            const title = document.getElementById('up-title').value;
            const desc = document.getElementById('up-desc').value;
            const cat = document.getElementById('up-cat').value;

            if(!file) return;

            const overlay = document.getElementById('processing-overlay');
            const bar = document.getElementById('proc-bar');
            const perc = document.getElementById('proc-perc');
            const stat = document.getElementById('proc-status');
            
            overlay.classList.remove('hidden');
            stat.innerText = "Fragmenting file for cloud distribution...";
            bar.style.width = '20%'; perc.innerText = '20%';

            try {
                const formData = new FormData();
                formData.append('file', file);

                stat.innerText = "Streaming to Global Node...";
                bar.style.width = '60%'; perc.innerText = '60%';

                // Using a public rapid hosting API (file.io) to handle storage without accounts
                const uploadResponse = await fetch('https://file.io/?expires=1w', {
                    method: 'POST',
                    body: formData
                });
                
                const uploadResult = await uploadResponse.json();
                
                if(!uploadResult.success) throw new Error("Cloud Node rejected the stream.");

                stat.innerText = "Indexing Link in Registry...";
                bar.style.width = '90%'; perc.innerText = '90%';

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'content_hub_items'), {
                    title, description: desc, category: cat, status: 'approved',
                    createdAt: serverTimestamp(),
                    files: [{
                        name: file.name,
                        url: uploadResult.link,
                        type: cat,
                        size: file.size,
                        expiry: '7 days'
                    }]
                });

                bar.style.width = '100%'; perc.innerText = '100%';
                stat.innerText = "Sync Complete.";
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    setTab('dashboard');
                }, 800);

            } catch (err) {
                console.error(err);
                alert("Infinite Sync Failed: " + err.message);
                overlay.classList.add('hidden');
            }
        };

        window.removeItem = async (id) => {
            if(confirm("Permanently wipe this asset node?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'content_hub_items', id));
            }
        };

        window.abortOperation = () => location.reload();
    </script>
</body>
</html>
