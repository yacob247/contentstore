<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Hub | Infinite Storage Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #f3f4f6; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(75, 85, 99, 0.3); }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        .btn-reject { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); transition: all 0.3s ease; }
        .btn-reject:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.4); }
        
        .progress-shimmer {
            background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 50%, #3b82f6 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-rejected { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .status-pending { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
    </style>
</head>
<body class="min-h-screen relative">

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <!-- Access Lock -->
    <div id="auth-overlay" class="fixed inset-0 z-[100] bg-gray-950 flex items-center justify-center p-6">
        <div class="w-full max-w-md glass-card p-10 rounded-[2.5rem] text-center shadow-2xl">
            <div class="w-20 h-20 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-blue-500/20">
                <i class="fa-solid fa-vault text-4xl text-blue-500"></i>
            </div>
            <h1 class="text-3xl font-extrabold mb-2 tracking-tight">Nexus Admin</h1>
            <p class="text-gray-500 text-sm mb-8">Infinite Storage Cluster Access</p>
            <form onsubmit="unlockAdmin(event)" class="space-y-4">
                <input type="password" id="admin-key" required class="w-full bg-gray-950 border border-gray-800 rounded-2xl px-5 py-4 text-center text-2xl tracking-[0.4em] focus:border-blue-500 outline-none transition" placeholder="••••">
                <button type="submit" class="w-full btn-gradient py-4 rounded-2xl font-bold text-lg">Initialize Session</button>
            </form>
        </div>
    </div>

    <!-- Main Workspace -->
    <div id="workspace" class="hidden flex-col min-h-screen">
        <header class="sticky top-0 z-50 glass-card border-x-0 border-t-0 border-b">
            <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/40">
                        <i class="fa-solid fa-infinity text-white text-xl"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="font-extrabold text-xl tracking-tighter leading-none">INFINITE<span class="text-blue-500">HUB</span></span>
                        <span class="text-[9px] uppercase tracking-[0.2em] text-gray-500 font-bold">Admin Console</span>
                    </div>
                </div>
                <nav class="flex items-center gap-8">
                    <button onclick="setTab('dashboard')" class="text-sm font-semibold hover:text-blue-400 transition" id="tab-dash">Dashboard</button>
                    <button onclick="setTab('upload')" class="bg-blue-600 hover:bg-blue-700 px-6 py-2.5 rounded-xl text-sm font-bold transition shadow-lg">New Deployment</button>
                    <button onclick="location.reload()" class="text-gray-500 hover:text-red-400 transition"><i class="fa-solid fa-power-off text-lg"></i></button>
                </nav>
            </div>
        </header>

        <main id="main-content" class="max-w-6xl mx-auto p-8 w-full"></main>
    </div>

    <!-- Reject & Email Modal -->
    <div id="reject-modal" class="fixed inset-0 z-[120] bg-gray-950/90 backdrop-blur-md hidden items-center justify-center p-6 opacity-0 transition-opacity duration-300">
        <div class="w-full max-w-lg glass-card p-8 rounded-[2rem] shadow-2xl border-orange-500/20 transform scale-95 transition-transform duration-300" id="reject-modal-content">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-orange-500/10 rounded-full flex items-center justify-center text-orange-500">
                        <i class="fa-solid fa-envelope-open-text"></i>
                    </div>
                    <h2 class="text-xl font-bold">Reject & Send Email</h2>
                </div>
                <button onclick="closeRejectModal()" class="text-gray-500 hover:text-white transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <form onsubmit="processReject(event)" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Send To (User Email)</label>
                    <input type="email" id="reject-email" required class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:border-orange-500 outline-none transition" placeholder="user@example.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Reason for Rejection</label>
                    <textarea id="reject-reason" required class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 h-28 text-sm focus:border-orange-500 outline-none transition resize-none" placeholder="Explain why this submission is being rejected..."></textarea>
                </div>
                <div class="pt-2 flex gap-3">
                    <button type="button" onclick="closeRejectModal()" class="flex-1 bg-gray-800 hover:bg-gray-700 py-3 rounded-xl font-bold transition">Cancel</button>
                    <button type="submit" id="reject-submit-btn" class="flex-1 btn-reject py-3 rounded-xl font-bold flex justify-center items-center gap-2">
                        <span>Reject & Send Email</span>
                        <i class="fa-solid fa-paper-plane text-sm"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 z-[120] bg-gray-950/90 backdrop-blur-md hidden items-center justify-center p-6 opacity-0 transition-opacity duration-300">
        <div class="w-full max-w-lg glass-card p-8 rounded-[2rem] shadow-2xl border-blue-500/20 transform scale-95 transition-transform duration-300" id="edit-modal-content">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-500/10 rounded-full flex items-center justify-center text-blue-500">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </div>
                    <h2 class="text-xl font-bold">Edit Asset</h2>
                </div>
                <button onclick="closeEditModal()" class="text-gray-500 hover:text-white transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <form onsubmit="processEdit(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Asset Name</label>
                    <input type="text" id="edit-title" required class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Category</label>
                    <select id="edit-cat" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition">
                        <option value="software">Software / Apps</option>
                        <option value="media">Movies / Videos</option>
                        <option value="docs">Guides / PDFs</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Description</label>
                    <textarea id="edit-desc" required class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 h-28 text-sm focus:border-blue-500 outline-none transition resize-none"></textarea>
                </div>
                <div class="pt-2 flex gap-3">
                    <button type="button" onclick="closeEditModal()" class="flex-1 bg-gray-800 hover:bg-gray-700 py-3 rounded-xl font-bold transition">Cancel</button>
                    <button type="submit" id="edit-submit-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold flex justify-center items-center gap-2 transition">
                        <span>Save Changes</span>
                        <i class="fa-solid fa-floppy-disk text-sm"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Confirm Delete Modal -->
    <div id="confirm-modal" class="fixed inset-0 z-[120] bg-gray-950/90 backdrop-blur-md hidden items-center justify-center p-6 opacity-0 transition-opacity duration-300">
        <div class="w-full max-w-sm glass-card p-8 rounded-[2rem] text-center shadow-2xl border-red-500/20 transform scale-95 transition-transform duration-300" id="confirm-modal-content">
            <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500">
                <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
            </div>
            <h2 class="text-xl font-bold mb-2">Delete Asset?</h2>
            <p class="text-gray-400 text-sm mb-8">This action is permanent. Users will no longer be able to see or download this asset.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 bg-gray-800 hover:bg-gray-700 py-3 rounded-xl font-bold transition">Cancel</button>
                <button id="confirm-delete-btn" class="flex-1 bg-red-600 hover:bg-red-700 py-3 rounded-xl font-bold transition">Delete</button>
            </div>
        </div>
    </div>

    <!-- Smart Upload Processing Overlay -->
    <div id="processing-overlay" class="fixed inset-0 z-[110] bg-gray-950/95 backdrop-blur-xl flex items-center justify-center hidden p-6">
        <div class="w-full max-w-lg glass-card p-12 rounded-[3rem] text-center border-blue-500/20">
            <div class="mb-8">
                <div class="w-24 h-24 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-500/20">
                    <i id="proc-icon" class="fa-solid fa-microchip text-5xl text-blue-500 animate-pulse"></i>
                </div>
                <h2 id="proc-title" class="text-2xl font-bold mb-2">Infinite Stream Sync</h2>
                <p id="proc-status" class="text-gray-400 text-sm font-mono">Compressing and Routing Bytes...</p>
            </div>

            <div class="relative h-4 bg-gray-900 rounded-full overflow-hidden border border-gray-800 mb-4">
                <div id="proc-bar" class="absolute top-0 left-0 h-full progress-shimmer w-0 transition-all duration-300"></div>
            </div>
            <div id="proc-meta" class="flex justify-between text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                <span>Optimizing Data</span>
                <span id="proc-perc">0%</span>
            </div>

            <button onclick="abortOperation()" class="mt-10 text-gray-500 hover:text-white text-xs font-bold uppercase tracking-widest transition">Cancel Link</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, currentTab = 'dashboard';
        let itemToDelete = null;
        let rejectContext = { id: null, title: '' };
        let editContext = { id: null };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'infinite-nexus-v1';

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
          apiKey: "AIzaSyB-3kAk-lMT3jTny2YIs2R1_0mG-tJlmJI",
          authDomain: "puzzlesapp.firebaseapp.com",
          databaseURL: "https://puzzlesapp-default-rtdb.firebaseio.com",
          projectId: "puzzlesapp",
          storageBucket: "puzzlesapp.firebasestorage.app",
          messagingSenderId: "303461259730",
          appId: "1:303461259730:web:a1790a976b6d58d71dd00b",
          measurementId: "G-8YEJEBX0NE"
        };

        // --- UI Utilities ---
        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let icon = '<i class="fa-solid fa-circle-check text-green-500"></i>';
            let borderColor = 'border-green-500/30';
            if (type === 'error') {
                icon = '<i class="fa-solid fa-circle-xmark text-red-500"></i>';
                borderColor = 'border-red-500/30';
            } else if (type === 'warning') {
                icon = '<i class="fa-solid fa-circle-exclamation text-orange-500"></i>';
                borderColor = 'border-orange-500/30';
            }

            toast.className = `glass-card border ${borderColor} px-5 py-4 rounded-2xl shadow-xl flex items-center gap-3 fade-in pointer-events-auto`;
            toast.innerHTML = `${icon}<span class="text-sm font-semibold text-white">${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        };

        window.unlockAdmin = async (e) => {
            e.preventDefault();
            if (document.getElementById('admin-key').value === 'password123') {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('workspace').classList.remove('hidden');
                document.getElementById('workspace').classList.add('flex');
                
                document.getElementById('main-content').innerHTML = `
                    <div class="flex justify-center items-center h-64 flex-col fade-in">
                        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
                        <p class="text-gray-400 font-medium">Connecting to Database Cluster...</p>
                    </div>`;

                try {
                    await init();
                } catch(err) {
                    console.error("Initialization error", err);
                    document.getElementById('main-content').innerHTML = `
                        <div class="flex justify-center items-center h-64 flex-col text-center fade-in">
                            <i class="fa-solid fa-triangle-exclamation text-4xl text-red-500 mb-4"></i>
                            <p class="text-white font-bold text-xl">Database Connection Failed</p>
                            <p class="text-gray-400 text-sm mt-2 max-w-md">${err.message}</p>
                            <button onclick="location.reload()" class="mt-6 px-6 py-2 bg-gray-800 rounded-xl hover:bg-gray-700 transition">Retry Connection</button>
                        </div>`;
                }
            } else { 
                showToast("Key Denied. Incorrect administration password.", "error");
            }
        };

        async function init() {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            await signInAnonymously(auth);
            setTab('dashboard');
        }

        window.setTab = (tab) => {
            currentTab = tab;
            render();
        }

        async function render() {
            const container = document.getElementById('main-content');
            if (currentTab === 'dashboard') {
                container.innerHTML = `<div class="grid gap-6" id="items-grid"></div>`;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'content_hub_items');
                
                onSnapshot(q, snap => {
                    const items = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    
                    document.getElementById('items-grid').innerHTML = `
                        <div class="flex justify-between items-end mb-8">
                            <div>
                                <h2 class="text-3xl font-extrabold">Asset Cluster</h2>
                                <p class="text-gray-500">Manage all pending and live deployments</p>
                            </div>
                            <div class="flex items-center gap-2 bg-gray-900 px-4 py-2 rounded-full border border-gray-800">
                                <span class="status-dot status-online"></span>
                                <span class="text-xs font-bold uppercase tracking-wider text-gray-400">Database Connected</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${items.length === 0 ? `
                                <div class="col-span-full py-20 text-center border-2 border-dashed border-gray-800 rounded-[2rem]">
                                    <i class="fa-solid fa-inbox text-4xl text-gray-700 mb-4"></i>
                                    <p class="text-gray-500 font-medium">No assets deployed yet. Start by creating a new deployment.</p>
                                </div>
                            ` : items.map(i => {
                                const isRejected = i.status === 'rejected';
                                const statusColor = isRejected ? 'status-rejected' : (i.status === 'pending' ? 'status-pending' : 'status-online');
                                const statusText = i.status ? i.status.toUpperCase() : 'APPROVED';
                                const esc = str => (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                                
                                return `
                                <div class="glass-card p-6 rounded-3xl ${isRejected ? 'border-red-500/20 opacity-80' : 'hover:border-blue-500/50'} transition-all group fade-in relative overflow-hidden flex flex-col">
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="flex items-center gap-3">
                                            <div class="w-12 h-12 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-400 group-hover:scale-110 transition">
                                                <i class="fa-solid ${i.category === 'software' ? 'fa-box-archive' : i.category === 'media' ? 'fa-clapperboard' : 'fa-file-lines'} text-xl"></i>
                                            </div>
                                            <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-gray-900 border border-gray-800">
                                                <span class="status-dot ${statusColor}"></span>
                                                <span class="text-[9px] font-bold tracking-widest text-gray-400">${statusText}</span>
                                            </div>
                                        </div>
                                        <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                            ${i.status !== 'approved' ? `
                                            <button onclick="approveItem('${i.id}')" class="w-8 h-8 rounded-full bg-green-500/10 text-green-500 flex items-center justify-center hover:bg-green-500 hover:text-white transition" title="Approve">
                                                <i class="fa-solid fa-check text-sm"></i>
                                            </button>
                                            ` : ''}
                                            ${!isRejected ? `
                                            <button onclick="openRejectModal('${i.id}', '${esc(i.title)}', '${i.uploaderEmail || ''}')" class="w-8 h-8 rounded-full bg-orange-500/10 text-orange-500 flex items-center justify-center hover:bg-orange-500 hover:text-white transition" title="Reject & Email">
                                                <i class="fa-solid fa-ban text-sm"></i>
                                            </button>
                                            ` : ''}
                                            <button onclick="openEditModal('${i.id}', '${esc(i.title)}', '${esc(i.description)}', '${i.category}')" class="w-8 h-8 rounded-full bg-blue-500/10 text-blue-500 flex items-center justify-center hover:bg-blue-500 hover:text-white transition" title="Edit">
                                                <i class="fa-solid fa-pen text-sm"></i>
                                            </button>
                                            <button onclick="confirmRemoveItem('${i.id}')" class="w-8 h-8 rounded-full bg-red-500/10 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition" title="Delete Permanent">
                                                <i class="fa-solid fa-trash-can text-sm"></i>
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <h3 class="font-bold text-xl mb-1 line-clamp-1">${i.title}</h3>
                                    <p class="text-gray-500 text-sm mb-4 line-clamp-2 flex-grow">${i.description}</p>
                                    
                                    ${isRejected && i.rejectReason ? `
                                        <div class="mb-4 bg-red-500/10 border border-red-500/20 rounded-xl p-3">
                                            <p class="text-xs text-red-400 font-semibold mb-1">Rejection Reason:</p>
                                            <p class="text-xs text-red-200/80 line-clamp-2 italic">"${i.rejectReason}"</p>
                                        </div>
                                    ` : ''}

                                    <div class="flex items-center justify-between pt-4 border-t border-gray-800 mt-auto">
                                        <span class="text-[10px] font-bold uppercase tracking-widest text-blue-500">${i.files?.length || 1} Asset Stream</span>
                                        <span class="text-[10px] text-gray-600 font-mono">ID: ${i.id.substring(0,6)}</span>
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    `;
                }, err => {
                    console.error("Snapshot error:", err);
                    showToast("Failed to load dashboard data.", "error");
                });
            } else {
                container.innerHTML = `
                    <div class="max-w-2xl mx-auto py-4 fade-in">
                        <form onsubmit="handleInfiniteUpload(event)" class="glass-card p-10 rounded-[2.5rem] space-y-6 shadow-2xl border-blue-500/10">
                            <div class="flex items-center gap-4 mb-2">
                                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center">
                                    <i class="fa-solid fa-cloud-arrow-up text-white text-xl"></i>
                                </div>
                                <div>
                                    <h2 class="text-2xl font-bold">New Asset Stream</h2>
                                    <p class="text-gray-500 text-xs">Files are hosted on the infinite public cluster</p>
                                </div>
                            </div>
                            
                            <div class="space-y-4">
                                <div class="group">
                                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Asset Name</label>
                                    <input id="up-title" required class="w-full bg-gray-950 border border-gray-800 rounded-2xl p-5 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition" placeholder="e.g. Photoshop Portable 2024">
                                </div>

                                <div class="group">
                                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Description</label>
                                    <textarea id="up-desc" required class="w-full bg-gray-950 border border-gray-800 rounded-2xl p-5 h-32 focus:border-blue-500 outline-none transition" placeholder="Explain what this file is for..."></textarea>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div class="group">
                                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Category</label>
                                        <select id="up-cat" class="w-full bg-gray-950 border border-gray-800 rounded-2xl p-5 outline-none focus:border-blue-500">
                                            <option value="software">Software / Apps</option>
                                            <option value="media">Movies / Videos</option>
                                            <option value="docs">Guides / PDFs</option>
                                        </select>
                                    </div>
                                    <div class="group">
                                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Physical File</label>
                                        <div class="relative group">
                                            <input type="file" id="up-file" required class="relative w-full bg-gray-950 border border-gray-800 rounded-2xl p-[18px] text-xs text-gray-500 file:bg-blue-600 file:border-0 file:rounded-xl file:px-4 file:py-2 file:text-white file:font-bold file:mr-4 hover:border-gray-700 transition">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="w-full btn-gradient py-5 rounded-2xl font-bold text-lg shadow-xl mt-4">Deploy to Nexus Hub</button>
                        </form>
                    </div>
                `;
            }
        }

        // --- Rejection & Email Logic ---
        
        window.openRejectModal = (id, title, email) => {
            rejectContext = { id, title };
            const modal = document.getElementById('reject-modal');
            const content = document.getElementById('reject-modal-content');
            
            // Auto-fill email if it was captured during upload, otherwise leave blank for admin to type
            document.getElementById('reject-email').value = email && email !== 'undefined' ? email : '';
            document.getElementById('reject-reason').value = '';
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // Trigger animation
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        };

        window.closeRejectModal = () => {
            const modal = document.getElementById('reject-modal');
            const content = document.getElementById('reject-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                rejectContext = { id: null, title: '' };
            }, 300);
        };

        window.processReject = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reject-submit-btn');
            const originalText = btn.innerHTML;
            const email = document.getElementById('reject-email').value;
            const reason = document.getElementById('reject-reason').value;

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
            btn.disabled = true;

            try {
                // 1. Update the document status to rejected and store the reason
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'content_hub_items', rejectContext.id), {
                    status: 'rejected',
                    rejectReason: reason,
                    rejectedAt: serverTimestamp()
                });

                // 2. Queue the email in Firestore. 
                // Note: To automatically send this, add the "Trigger Email" Extension in your Firebase Console pointing to this path.
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'mail_queue'), {
                    to: email,
                    message: {
                        subject: `Update on your Nexus Hub submission: ${rejectContext.title}`,
                        text: `Your submission "${rejectContext.title}" has been reviewed and was unfortunately rejected.\n\nReason from Administrator:\n${reason}\n\nPlease fix the issues and submit again.`,
                        html: `
                            <div style="font-family: sans-serif; padding: 20px; color: #333;">
                                <h2 style="color: #ea580c;">Submission Update</h2>
                                <p>Your submission "<strong>${rejectContext.title}</strong>" has been reviewed and was unfortunately rejected.</p>
                                <div style="background: #f3f4f6; padding: 15px; border-left: 4px solid #ea580c; margin: 20px 0;">
                                    <strong>Reason from Administrator:</strong><br/>
                                    ${reason.replace(/\n/g, '<br/>')}
                                </div>
                                <p>Please correct these issues and feel free to submit again.</p>
                            </div>
                        `
                    },
                    status: 'queued',
                    createdAt: serverTimestamp(),
                    relatedItemId: rejectContext.id
                });

                showToast("Item rejected and email queued for sending!", "success");
                closeRejectModal();

            } catch (err) {
                console.error("Rejection Error:", err);
                showToast("Error processing rejection: " + err.message, "error");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        // --- Approve & Edit Logic ---

        window.approveItem = async (id) => {
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'content_hub_items', id), {
                    status: 'approved',
                    approvedAt: serverTimestamp()
                });
                showToast("Item approved successfully!", "success");
            } catch (err) {
                console.error("Approval Error:", err);
                showToast("Error approving item: " + err.message, "error");
            }
        };

        window.openEditModal = (id, title, desc, cat) => {
            editContext = { id };
            const modal = document.getElementById('edit-modal');
            const content = document.getElementById('edit-modal-content');
            
            // Unescape entities for the form inputs
            const unescapeStr = str => {
                const txt = document.createElement('textarea');
                txt.innerHTML = str;
                return txt.value;
            };

            document.getElementById('edit-title').value = unescapeStr(title);
            document.getElementById('edit-desc').value = unescapeStr(desc);
            document.getElementById('edit-cat').value = cat || 'software';
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        };

        window.closeEditModal = () => {
            const modal = document.getElementById('edit-modal');
            const content = document.getElementById('edit-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                editContext = { id: null };
            }, 300);
        };

        window.processEdit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('edit-submit-btn');
            const originalText = btn.innerHTML;
            
            const title = document.getElementById('edit-title').value;
            const desc = document.getElementById('edit-desc').value;
            const cat = document.getElementById('edit-cat').value;

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Saving...';
            btn.disabled = true;

            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'content_hub_items', editContext.id), {
                    title: title,
                    description: desc,
                    category: cat,
                    updatedAt: serverTimestamp()
                });

                showToast("Changes saved successfully!", "success");
                closeEditModal();
            } catch (err) {
                console.error("Edit Error:", err);
                showToast("Error saving changes: " + err.message, "error");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        // --- Custom Confirmation Dialogs ---

        window.confirmRemoveItem = (id) => {
            itemToDelete = id;
            const modal = document.getElementById('confirm-modal');
            const content = document.getElementById('confirm-modal-content');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);

            document.getElementById('confirm-delete-btn').onclick = executeDelete;
        };

        window.closeConfirmModal = () => {
            const modal = document.getElementById('confirm-modal');
            const content = document.getElementById('confirm-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                itemToDelete = null;
            }, 300);
        };

        async function executeDelete() {
            if(!itemToDelete) return;
            const btn = document.getElementById('confirm-delete-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'content_hub_items', itemToDelete));
                showToast("Asset successfully deleted.", "success");
            } catch (err) {
                console.error(err);
                showToast("Failed to delete item: " + err.message, "error");
            } finally {
                btn.innerHTML = 'Delete';
                btn.disabled = false;
                closeConfirmModal();
            }
        }

        // --- Upload Logic ---

        async function uploadToFreeHost(file, updateStatusFn) {
            try {
                updateStatusFn(5, "Connecting to Infinite Hub (Gofile)...");
                const srvRes = await fetch('https://api.gofile.io/servers');
                const srvJson = await srvRes.json();
                if(srvJson.status !== 'ok') throw new Error("Primary server offline");
                const server = srvJson.data.servers[0].name;

                const formData = new FormData();
                formData.append('file', file);
                
                return await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `https://${server}.gofile.io/contents/uploadfile`);
                    
                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const percent = 10 + ((e.loaded / e.total) * 80);
                            const mbLoaded = Math.round((e.loaded / 1024 / 1024) * 10) / 10;
                            const mbTotal = Math.round((e.total / 1024 / 1024) * 10) / 10;
                            updateStatusFn(percent, `Streaming: ${mbLoaded}MB / ${mbTotal}MB`);
                        }
                    };
                    
                    xhr.onload = () => {
                        if (xhr.status === 200) {
                            try {
                                const res = JSON.parse(xhr.responseText);
                                if(res.status === 'ok') resolve(res.data.downloadPage);
                                else reject(new Error("Upload rejected: " + res.status));
                            } catch(e) { reject(e); }
                        } else reject(new Error("Host error: " + xhr.status));
                    };
                    
                    xhr.onerror = () => reject(new Error("Network CORS blocked."));
                    xhr.send(formData);
                });
            } catch (err) {
                console.warn("Primary host failed, routing to backup...", err);
                updateStatusFn(10, "Routing to Backup Host (tmpfiles)...");
                
                const formData = new FormData();
                formData.append('file', file);
                return await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', 'https://tmpfiles.org/api/v1/upload');
                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const percent = 10 + ((e.loaded / e.total) * 85);
                            updateStatusFn(percent, `Streaming Backup: ${Math.round(percent)}%`);
                        }
                    };
                    xhr.onload = () => {
                        if (xhr.status === 200) {
                            try {
                                const res = JSON.parse(xhr.responseText);
                                if(res.status === 'success') {
                                    resolve(res.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/'));
                                } else reject(new Error("Backup failed"));
                            } catch(e) { reject(e); }
                        } else reject(new Error("All hosts blocked"));
                    };
                    xhr.onerror = () => reject(new Error("All free hosts blocked."));
                    xhr.send(formData);
                });
            }
        }

        window.handleInfiniteUpload = async (e) => {
            e.preventDefault();
            const file = document.getElementById('up-file').files[0];
            const title = document.getElementById('up-title').value;
            const desc = document.getElementById('up-desc').value;
            const cat = document.getElementById('up-cat').value;

            if(!file) return;

            const overlay = document.getElementById('processing-overlay');
            const bar = document.getElementById('proc-bar');
            const perc = document.getElementById('proc-perc');
            const stat = document.getElementById('proc-status');
            
            overlay.classList.remove('hidden');

            const updateStatus = (p, text) => {
                bar.style.width = p + '%';
                perc.innerText = Math.round(p) + '%';
                stat.innerText = text;
            };

            try {
                const publicLink = await uploadToFreeHost(file, updateStatus);
                updateStatus(95, "Syncing metadata with Database...");

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'content_hub_items'), {
                    title, 
                    description: desc, 
                    category: cat, 
                    status: 'approved',
                    createdAt: serverTimestamp(),
                    files: [{
                        name: file.name,
                        url: publicLink,
                        type: cat,
                        size: (file.size / (1024 * 1024)).toFixed(2) + ' MB',
                        uploadedAt: new Date().toISOString()
                    }]
                });

                updateStatus(100, "Deployment Successful!");
                
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    setTab('dashboard');
                    showToast("Deployment published to Hub!", "success");
                }, 1000);

            } catch (err) {
                console.error(err);
                overlay.classList.add('hidden');
                showToast("Upload Failed: " + err.message, "error");
            }
        };

        window.abortOperation = () => location.reload();
    </script>
</body>
